<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trocar Senha — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container">
    <div class="row justify-content-center mt-4">
      <div class="col-sm-11 col-md-8 col-lg-6">

        <div class="mb-4">
          <h4 class="fw-semibold mb-0">
            <i class="bi bi-lock me-2" style="color: var(--vermelho)"></i>Alterar Senha
          </h4>
          <p class="text-muted small mb-0">Defina uma nova senha para sua conta</p>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4">

            <form id="form-trocar-senha" novalidate>

              <!-- Senha atual -->
              <div class="campo mb-3">
                <label for="old_password" class="form-label fw-semibold small">Senha atual</label>
                <input type="password" id="old_password" name="old_password" required autofocus
                       class="form-control" autocomplete="current-password" />
              </div>

              <!-- Nova senha -->
              <div class="campo mb-3">
                <label for="new_password1" class="form-label fw-semibold small">Nova senha</label>
                <input type="password" id="new_password1" name="new_password1" required
                       class="form-control" autocomplete="new-password" />
                <ul class="regras-senha">
                  <li>Mínimo de 8 caracteres</li>
                  <li>Não pode ser inteiramente numérica</li>
                  <li>Não pode ser uma senha muito comum (ex.: "12345678")</li>
                  <li>Não pode ser muito parecida com seu usuário ou e-mail</li>
                </ul>
              </div>

              <!-- Confirmar nova senha -->
              <div class="campo mb-4">
                <label for="new_password2" class="form-label fw-semibold small">Confirmar nova senha</label>
                <input type="password" id="new_password2" name="new_password2" required
                       class="form-control" autocomplete="new-password" />
              </div>

              <p id="mensagem-erro" class="erro"></p>
              <p id="mensagem-sucesso" class="sucesso"></p>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger flex-grow-1">
                  <i class="bi bi-lock-fill me-1"></i>Salvar nova senha
                </button>
                <a href="index.html" class="btn btn-outline-secondary">Cancelar</a>
              </div>

            </form>

          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Ordem de inclusão garante que constantes e autenticacao estejam disponíveis globalmente -->
  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/trocar-senha.js"></script>
</body>
</html>
