<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrar — Cucina Italiana</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container">
    <div class="row justify-content-center mt-5 mb-5">
      <div class="col-sm-11 col-md-8 col-lg-6">

        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">

            <div class="text-center mb-4">
              <i class="bi bi-person-plus-fill fs-1" style="color: var(--vermelho)"></i>
              <h4 class="mt-2 fw-semibold">Criar Conta</h4>
              <p class="text-muted small">Preencha os dados abaixo para se registrar</p>
            </div>

            <form id="form-registro" novalidate>

              <!-- Nome e Sobrenome lado a lado -->
              <div class="campos-linha mb-3">
                <div class="campo">
                  <label for="first_name" class="form-label fw-semibold">Nome *</label>
                  <input type="text" id="first_name" name="first_name" required autofocus
                         class="form-control" placeholder="Ex.: Maria" />
                </div>
                <div class="campo">
                  <label for="last_name" class="form-label fw-semibold">Sobrenome *</label>
                  <input type="text" id="last_name" name="last_name" required
                         class="form-control" placeholder="Ex.: Silva" />
                </div>
              </div>

              <!-- Usuário -->
              <div class="campo mb-3">
                <label for="username" class="form-label fw-semibold">Usuário *</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-at text-muted"></i>
                  </span>
                  <input type="text" id="username" name="username" required
                         class="form-control border-start-0" autocomplete="username" />
                </div>
              </div>

              <!-- E-mail -->
              <div class="campo mb-3">
                <label for="email" class="form-label fw-semibold">E-mail *</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-envelope text-muted"></i>
                  </span>
                  <input type="email" id="email" name="email" required
                         class="form-control border-start-0" autocomplete="email" />
                </div>
                <div id="erro-email" class="form-text text-danger d-none"></div>
              </div>

              <!-- Senha -->
              <div class="campo mb-3">
                <label for="password" class="form-label fw-semibold">Senha *</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-lock text-muted"></i>
                  </span>
                  <input type="password" id="password" name="password" required
                         class="form-control border-start-0" autocomplete="new-password" />
                </div>
                <!-- Barra de força da senha — atualizada em tempo real pelo TypeScript -->
                <div id="forca-senha" class="forca-senha d-none">
                  <div class="forca-senha-barra">
                    <div id="forca-senha-preenchimento" class="forca-senha-preenchimento"></div>
                  </div>
                  <span id="forca-senha-rotulo" class="forca-senha-rotulo"></span>
                </div>
                <ul class="regras-senha">
                  <li>Mínimo de 8 caracteres</li>
                  <li>Não pode ser inteiramente numérica</li>
                  <li>Não pode ser uma senha muito comum (ex.: "12345678")</li>
                  <li>Não pode ser muito parecida com seu usuário ou e-mail</li>
                </ul>
              </div>

              <!-- Confirmar senha -->
              <div class="campo mb-4">
                <label for="password_confirm" class="form-label fw-semibold">Confirmar senha *</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-lock-fill text-muted"></i>
                  </span>
                  <input type="password" id="password_confirm" name="password_confirm" required
                         class="form-control border-start-0" autocomplete="new-password" />
                </div>
                <div id="erro-senha-confirm" class="form-text text-danger d-none"></div>
              </div>

              <p id="mensagem-erro" class="erro"></p>

              <div class="d-grid">
                <button type="submit" class="btn btn-danger btn-lg">
                  <i class="bi bi-person-check me-1"></i>Criar Conta
                </button>
              </div>

            </form>

            <hr class="my-4" />

            <div class="text-center small">
              Já tem conta?
              <a href="login.html" class="fw-semibold text-decoration-none" style="color: var(--vermelho)">Faça login</a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Ordem de inclusão garante que constantes e autenticacao estejam disponíveis globalmente -->
  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/registro.js"></script>
</body>
</html>
