<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Perfil — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-sm-11 col-md-8 col-lg-6">

        <!-- Cabeçalho da página -->
        <div class="mb-4">
          <h4 class="fw-semibold mb-0">
            <i class="bi bi-person-circle me-2" style="color: var(--vermelho)"></i>Meu Perfil
          </h4>
          <p class="text-muted small mb-0">Gerencie as informações da sua conta</p>
        </div>

        <!-- Estado de carregamento -->
        <div id="estado-carregando" class="text-center py-5 text-muted">
          <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
          Carregando...
        </div>

        <!-- Conteúdo principal (oculto até os dados carregarem) -->
        <div id="conteudo-perfil" class="d-none">

          <!-- Seção 1: informações da conta (somente leitura) -->
          <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
              <p class="text-muted small fw-semibold text-uppercase mb-3"
                 style="font-size: .7rem; letter-spacing: .05em;">Informações da conta</p>
              <dl class="row mb-0 small">
                <dt class="col-5 text-muted fw-normal">Usuário</dt>
                <dd class="col-7 mb-2" id="info-username">—</dd>

                <dt class="col-5 text-muted fw-normal">Nome completo</dt>
                <dd class="col-7 mb-2" id="info-nome">—</dd>

                <dt class="col-5 text-muted fw-normal">E-mail</dt>
                <dd class="col-7 mb-2" id="info-email">—</dd>

                <dt class="col-5 text-muted fw-normal">Tipo de perfil</dt>
                <dd class="col-7 mb-2" id="info-tipo">—</dd>

                <dt class="col-5 text-muted fw-normal">Membro desde</dt>
                <dd class="col-7 mb-0" id="info-membro">—</dd>
              </dl>
            </div>
          </div>

          <!-- Seção 2: formulário de edição dos dados pessoais -->
          <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
              <p class="text-muted small fw-semibold text-uppercase mb-3"
                 style="font-size: .7rem; letter-spacing: .05em;">Editar dados pessoais</p>

              <form id="form-perfil" novalidate>

                <!-- Nome e Sobrenome lado a lado -->
                <div class="campos-linha mb-3">
                  <div class="campo">
                    <label for="first_name" class="form-label fw-semibold small">Nome *</label>
                    <input type="text" id="first_name" name="first_name" required
                           class="form-control" autocomplete="given-name" />
                  </div>
                  <div class="campo">
                    <label for="last_name" class="form-label fw-semibold small">Sobrenome *</label>
                    <input type="text" id="last_name" name="last_name" required
                           class="form-control" autocomplete="family-name" />
                  </div>
                </div>

                <!-- E-mail -->
                <div class="campo mb-4">
                  <label for="email" class="form-label fw-semibold small">E-mail *</label>
                  <input type="email" id="email" name="email" required
                         class="form-control" autocomplete="email" />
                </div>

                <p id="mensagem-erro"    class="erro"></p>
                <p id="mensagem-sucesso" class="sucesso"></p>

                <div class="d-grid">
                  <button type="submit" class="btn btn-danger">
                    <i class="bi bi-floppy me-1"></i>Salvar Alterações
                  </button>
                </div>

              </form>
            </div>
          </div>

          <!-- Seção 3: segurança -->
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <p class="text-muted small fw-semibold text-uppercase mb-3"
                 style="font-size: .7rem; letter-spacing: .05em;">Segurança</p>
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <p class="fw-semibold small mb-0">Senha</p>
                  <p class="text-muted small mb-0">Altere sua senha de acesso</p>
                </div>
                <a href="trocar-senha.html" class="btn btn-outline-secondary btn-sm">
                  <i class="bi bi-lock me-1"></i>Alterar Senha
                </a>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <!-- Ordem obrigatória: constantes → autenticacao → logout → lógica da página -->
  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/perfil.js"></script>
</body>
</html>
