<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adicionar Cartão — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-sm-11 col-md-8 col-lg-6">

        <!-- Cabeçalho da seção -->
        <div class="mb-4">
          <h2 class="fw-semibold mb-0">
            <i class="bi bi-credit-card me-2" style="color: var(--vermelho)"></i>Adicionar Cartão
          </h2>
          <p class="text-muted small mb-0">Preencha os dados do cartão a ser salvo</p>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">

            <p id="mensagem-sucesso" class="sucesso"></p>

            <form id="form-cartao" novalidate>

              <!-- Apelido -->
              <div class="campo mb-3">
                <label for="apelido" class="form-label fw-semibold">Apelido *</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-tag text-muted"></i>
                  </span>
                  <input type="text" id="apelido" name="apelido" required
                         placeholder="Ex.: Nubank, Visa final 1234"
                         class="form-control border-start-0" />
                </div>
              </div>

              <!-- Nome do titular -->
              <div class="campo mb-3">
                <label for="nome_titular" class="form-label fw-semibold">Nome do titular *</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-person text-muted"></i>
                  </span>
                  <input type="text" id="nome_titular" name="nome_titular" required
                         placeholder="Nome impresso no cartão"
                         class="form-control border-start-0" autocomplete="cc-name" />
                </div>
              </div>

              <!-- Número do cartão -->
              <div class="campo mb-3">
                <label for="numero" class="form-label fw-semibold">Número do cartão *</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-credit-card text-muted"></i>
                  </span>
                  <input type="text" id="numero" name="numero" required
                         placeholder="0000 0000 0000 0000" maxlength="19"
                         class="form-control border-start-0" autocomplete="cc-number" />
                </div>
              </div>

              <!-- Bandeira e Tipo (lado a lado) -->
              <div class="campos-linha mb-3">
                <div class="campo">
                  <label for="bandeira" class="form-label fw-semibold">Bandeira *</label>
                  <select id="bandeira" name="bandeira" required class="form-select">
                    <option value="">Selecione…</option>
                    <option value="visa">Visa</option>
                    <option value="mastercard">Mastercard</option>
                    <option value="elo">Elo</option>
                    <option value="amex">American Express</option>
                  </select>
                </div>
                <div class="campo">
                  <label for="tipo" class="form-label fw-semibold">Tipo *</label>
                  <select id="tipo" name="tipo" required class="form-select">
                    <option value="">Selecione…</option>
                    <option value="credito">Crédito</option>
                    <option value="debito">Débito</option>
                  </select>
                </div>
              </div>

              <!-- Validade e CVV (lado a lado) -->
              <div class="campos-linha mb-4">
                <div class="campo">
                  <label for="validade" class="form-label fw-semibold">Validade *</label>
                  <input type="text" id="validade" name="validade" required
                         placeholder="MM/AAAA" maxlength="7"
                         class="form-control" autocomplete="cc-exp" />
                </div>
                <div class="campo">
                  <label for="cvv" class="form-label fw-semibold">CVV *</label>
                  <input type="text" id="cvv" name="cvv" required
                         placeholder="000" maxlength="4"
                         class="form-control" autocomplete="cc-csc" />
                </div>
              </div>

              <p id="mensagem-erro" class="erro"></p>

              <!-- Botões -->
              <div class="d-flex gap-2">
                <button type="submit" id="btn-salvar" class="btn btn-danger flex-grow-1">
                  <i class="bi bi-floppy me-1"></i>Salvar Cartão
                </button>
                <a href="meus-cartoes.html" class="btn btn-outline-secondary">Cancelar</a>
              </div>

            </form>

          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/adicionar-cartao.js"></script>
</body>
</html>
