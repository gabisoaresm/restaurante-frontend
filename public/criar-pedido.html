<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Pedido — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container mt-4">

    <!-- Cabeçalho da seção -->
    <div class="d-flex justify-content-between align-items-start mb-4">
      <div>
        <h2 class="fw-semibold mb-0">Novo Pedido</h2>
        <p class="text-muted small mb-0">Selecione os itens e confirme o pagamento</p>
      </div>
      <a href="meus-pedidos.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-bag-check me-1"></i>Meus Pedidos
      </a>
    </div>

    <!-- Indicador de carregamento -->
    <div id="carregando" class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
      Carregando cardápio…
    </div>

    <!-- Formulário de pedido — populado via JavaScript -->
    <form id="form-pedido" class="d-none" novalidate>

      <!-- Tabelas de itens por categoria — injetadas via JS -->
      <div id="secoes-itens"></div>

      <!-- Observações -->
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
          <div class="campo mb-0">
            <label for="observacoes" class="form-label fw-semibold">
              <i class="bi bi-chat-left-text me-1 text-muted"></i>Observações
            </label>
            <textarea id="observacoes" name="observacoes" rows="2"
                      class="form-control" placeholder="Ex.: sem cebola, ponto da carne…"></textarea>
          </div>
        </div>
      </div>

      <!-- Pagamento e total -->
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
          <h6 class="fw-semibold text-uppercase text-muted mb-3"
              style="font-size: .7rem; letter-spacing: .07em;">
            <i class="bi bi-credit-card me-1"></i>Pagamento
          </h6>
          <div class="campos-linha mb-0">
            <div class="campo">
              <label for="forma-pagamento" class="form-label fw-semibold">Forma de pagamento *</label>
              <select id="forma-pagamento" class="form-select">
                <option value="">Selecione…</option>
                <option value="pix">Pix</option>
                <option value="dinheiro">Dinheiro</option>
                <option value="cartao_debito">Cartão de Débito</option>
                <option value="cartao_credito">Cartão de Crédito</option>
              </select>
            </div>
            <div class="d-flex flex-column justify-content-end">
              <p class="text-muted small mb-1">Total do pedido</p>
              <p id="total-pedido" class="fw-semibold fs-5 mb-0" style="color: var(--vermelho)">R$ 0,00</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Mensagem de erro -->
      <p id="mensagem-erro" class="erro"></p>

      <!-- Ações -->
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger flex-grow-1">
          <i class="bi bi-check-circle me-1"></i>Confirmar Pedido
        </button>
        <a href="meus-pedidos.html" class="btn btn-outline-secondary">Cancelar</a>
      </div>

    </form>

  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/criar-pedido.js"></script>
</body>
</html>
