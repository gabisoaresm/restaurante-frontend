<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-sm-10 col-md-7 col-lg-5">

        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">

            <div class="text-center mb-4">
              <i class="bi bi-shield-lock fs-1" style="color: var(--vermelho)"></i>
              <h4 class="mt-2 fw-semibold">Redefinir Senha</h4>
              <p class="text-muted small">Cole o token do e-mail e escolha uma nova senha</p>
            </div>

            <form id="form-redefinir-senha" novalidate>

              <!-- Token -->
              <div class="campo mb-3">
                <label for="token" class="form-label fw-semibold">Token recebido por e-mail</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-key text-muted"></i>
                  </span>
                  <input type="text" id="token" name="token" required autofocus
                         class="form-control border-start-0" placeholder="Cole o token aqui" />
                </div>
              </div>

              <!-- Nova senha -->
              <div class="campo mb-3">
                <label for="password" class="form-label fw-semibold">Nova senha</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-lock text-muted"></i>
                  </span>
                  <input type="password" id="password" name="password" required
                         class="form-control border-start-0" autocomplete="new-password" />
                </div>
                <ul class="regras-senha">
                  <li>Mínimo de 8 caracteres</li>
                  <li>Não pode ser inteiramente numérica</li>
                  <li>Não pode ser uma senha muito comum (ex.: "12345678")</li>
                  <li>Não pode ser muito parecida com seu usuário ou e-mail</li>
                </ul>
              </div>

              <!-- Confirmar nova senha -->
              <div class="campo mb-4">
                <label for="password_confirm" class="form-label fw-semibold">Confirmar nova senha</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-lock-fill text-muted"></i>
                  </span>
                  <input type="password" id="password_confirm" name="password_confirm" required
                         class="form-control border-start-0" autocomplete="new-password" />
                </div>
              </div>

              <p id="mensagem-erro" class="erro"></p>

              <div class="d-grid">
                <button type="submit" class="btn btn-danger btn-lg">
                  <i class="bi bi-check-circle me-1"></i>Redefinir senha
                </button>
              </div>

            </form>

            <hr class="my-4" />

            <div class="text-center small">
              <a href="esqueci-senha.html" class="text-decoration-none" style="color: var(--vermelho)">
                <i class="bi bi-arrow-repeat me-1"></i>Solicitar novo token
              </a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Ordem de inclusão garante que constantes e autenticacao estejam disponíveis globalmente -->
  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/redefinir-senha.js"></script>
</body>
</html>
