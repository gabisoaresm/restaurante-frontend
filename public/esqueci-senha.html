<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Senha — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-sm-10 col-md-7 col-lg-5">

        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">

            <div class="text-center mb-4">
              <i class="bi bi-envelope-open fs-1" style="color: var(--vermelho)"></i>
              <h4 class="mt-2 fw-semibold">Recuperar Senha</h4>
              <p class="text-muted small">Informe seu e-mail para receber o token de recuperação</p>
            </div>

            <form id="form-esqueci-senha" novalidate>

              <div class="campo mb-4">
                <label for="email" class="form-label fw-semibold">E-mail</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-envelope text-muted"></i>
                  </span>
                  <input type="email" id="email" name="email" required autofocus
                         class="form-control border-start-0" autocomplete="email" />
                </div>
              </div>

              <p id="mensagem-erro" class="erro"></p>
              <p id="mensagem-sucesso" class="sucesso"></p>

              <div class="d-grid">
                <button type="submit" class="btn btn-danger btn-lg">
                  <i class="bi bi-send me-1"></i>Enviar token
                </button>
              </div>

            </form>

            <hr class="my-4" />

            <p class="text-muted small text-center mb-2">
              Se não tiver mais acesso ao seu e-mail, entre em contato com o administrador do sistema.
            </p>
            <div class="text-center small">
              <a href="login.html" class="text-decoration-none" style="color: var(--vermelho)">
                <i class="bi bi-arrow-left me-1"></i>Voltar para o login
              </a>
              <span class="text-muted mx-2">·</span>
              Já tem o token?
              <a href="redefinir-senha.html" class="fw-semibold text-decoration-none" style="color: var(--vermelho)">Redefinir senha</a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Ordem de inclusão garante que constantes e autenticacao estejam disponíveis globalmente -->
  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/esqueci-senha.js"></script>
</body>
</html>
