<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Item — Cucina Italiana</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-sm-11 col-md-8 col-lg-6">

        <div class="mb-4">
          <h4 class="fw-semibold mb-0">
            <i class="bi bi-pencil-square me-2" style="color: var(--vermelho)"></i>Editar Item
          </h4>
          <!-- Subtítulo preenchido via JS com o nome atual do item -->
          <p id="subtitulo" class="text-muted small mb-0">Carregando…</p>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <form id="form-item" novalidate>

              <!-- Nome -->
              <div class="campo mb-3">
                <label for="nome" class="form-label fw-semibold">Nome *</label>
                <input type="text" id="nome" name="nome" required
                       class="form-control" placeholder="Nome do item" autocomplete="off" />
              </div>

              <!-- Descrição -->
              <div class="campo mb-3">
                <label for="descricao" class="form-label fw-semibold">Descrição *</label>
                <textarea id="descricao" name="descricao" required rows="3"
                          class="form-control" placeholder="Descrição detalhada do item"></textarea>
                <div id="contador-descricao" class="form-text text-end text-muted">0 / 300 caracteres</div>
              </div>

              <!-- Preço e Categoria lado a lado -->
              <div class="campos-linha mb-3">
                <div class="campo">
                  <label for="preco" class="form-label fw-semibold">Preço (R$) *</label>
                  <input type="number" id="preco" name="preco" required
                         min="0" step="0.01" class="form-control" placeholder="0,00" />
                </div>
                <div class="campo">
                  <label for="categoria" class="form-label fw-semibold">Categoria *</label>
                  <!-- Opções populadas via JavaScript -->
                  <select id="categoria" name="categoria" required class="form-select">
                    <option value="">Selecione…</option>
                  </select>
                </div>
              </div>

              <!-- Imagem atual em formato real: mesmas classes e largura do card do cardápio -->
              <div id="preview-imagem-atual" class="mb-3 d-none">
                <p class="form-label fw-semibold mb-1">Foto atual</p>
                <div class="card shadow-sm border-0" style="max-width: 300px; overflow: hidden;">
                  <img id="img-atual" src="" alt="Foto atual do item"
                       class="card-img-top card-img-item w-100" />
                </div>
                <!-- Botão para excluir a foto atual — aciona remoção no envio do formulário -->
                <button type="button" id="btn-excluir-imagem"
                        class="btn btn-sm btn-outline-danger mt-2">
                  <i class="bi bi-trash me-1"></i>Excluir foto
                </button>
              </div>

              <!-- Upload de nova imagem -->
              <div class="campo mb-3">
                <label for="imagem" class="form-label fw-semibold">
                  <span id="label-imagem">Nova foto</span>
                </label>
                <input type="file" id="imagem" name="imagem" accept="image/*"
                       class="form-control" />
                <div class="form-text text-muted">
                  Opcional. Deixe em branco para manter a foto atual.
                </div>
              </div>

              <!-- Pré-visualização em formato real: mesmas classes e largura do card do cardápio -->
              <div id="preview-imagem-nova" class="mb-3 d-none">
                <div class="card shadow-sm border-0" style="max-width: 300px; overflow: hidden;">
                  <img id="img-preview-nova" src="" alt="Pré-visualização da foto"
                       class="card-img-top card-img-item w-100" />
                </div>
              </div>

              <!-- Disponível -->
              <div class="mb-4">
                <div class="form-check">
                  <input type="checkbox" id="disponivel" name="disponivel"
                         class="form-check-input" />
                  <label for="disponivel" class="form-check-label fw-semibold">
                    Disponível para pedido
                  </label>
                </div>
              </div>

              <p id="mensagem-erro" class="erro"></p>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger flex-grow-1">
                  <i class="bi bi-check-lg me-1"></i>Salvar Alterações
                </button>
                <a href="cardapio.html" class="btn btn-outline-secondary">Cancelar</a>
              </div>

            </form>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/editar-item.js"></script>
</body>
</html>
