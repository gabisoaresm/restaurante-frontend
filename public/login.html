<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Restaurante</title>
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container">
    <section class="caixa-formulario">
      <h1>Entrar</h1>
      <form id="form-login" novalidate>
        <div class="campo">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" required autofocus />
        </div>
        <div class="campo">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required />
        </div>
        <p id="mensagem-erro" class="erro"></p>
        <button type="submit">Entrar</button>
      </form>
      <p class="link-secundario">
        Não tem conta? <a href="registro.html">Registre-se</a>
      </p>
      <p class="link-secundario">
        <a href="esqueci-senha.html">Esqueci minha senha</a>
      </p>
    </section>
  </main>

  <!-- Ordem de inclusão garante que constantes e autenticacao estejam disponíveis globalmente -->
  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/login.js"></script>
</body>
</html>
