<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Categoria — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-sm-10 col-md-7 col-lg-5">

        <div class="mb-4">
          <h4 class="fw-semibold mb-0">
            <i class="bi bi-pencil-square me-2" style="color: var(--vermelho)"></i>Editar Categoria
          </h4>
          <!-- Subtítulo preenchido via JS com o nome atual da categoria -->
          <p id="subtitulo" class="text-muted small mb-0">Carregando…</p>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <form id="form-categoria" novalidate>

              <div class="campo mb-4">
                <label for="nome" class="form-label fw-semibold">Nome *</label>
                <input type="text" id="nome" name="nome" required
                       class="form-control" placeholder="Nome da categoria" autocomplete="off" />
              </div>

              <p id="mensagem-erro" class="erro"></p>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger flex-grow-1">
                  <i class="bi bi-check-lg me-1"></i>Salvar Alterações
                </button>
                <a href="gerenciar-categorias.html" class="btn btn-outline-secondary">Cancelar</a>
              </div>

            </form>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/editar-categoria.js"></script>
</body>
</html>
