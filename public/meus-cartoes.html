<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Cartões — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container mt-4">

    <!-- Cabeçalho com botão de adicionar -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="fw-semibold mb-0">Meus Cartões</h2>
        <p class="text-muted small mb-0">Cartões salvos para pagamento</p>
      </div>
      <a href="adicionar-cartao.html" class="btn btn-danger btn-sm">
        <i class="bi bi-plus-lg me-1"></i>Adicionar Cartão
      </a>
    </div>

    <!-- Indicador de carregamento -->
    <div id="carregando" class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
      Carregando cartões…
    </div>

    <!-- Mensagem de erro global -->
    <p id="mensagem-erro" class="erro text-center"></p>

    <!-- Grid de cartões — populada via JavaScript -->
    <div id="lista-cartoes" class="row g-3"></div>

  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/meus-cartoes.js"></script>
</body>
</html>
