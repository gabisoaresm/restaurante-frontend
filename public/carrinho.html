<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Carrinho — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container mt-4">

    <!-- Cabeçalho da seção -->
    <div class="mb-4">
      <h2 class="fw-semibold mb-0">
        <i class="bi bi-cart3 me-2" style="color: var(--vermelho)"></i>Meu Carrinho
      </h2>
      <p class="text-muted small mb-0">Revise os itens e confirme o pedido</p>
    </div>

    <!-- Estado vazio — exibido pelo JS quando o carrinho está vazio -->
    <div id="estado-vazio" class="d-none">
      <div class="card shadow-sm border-0">
        <div class="card-body text-center py-5">
          <i class="bi bi-cart-x fs-2 text-muted d-block mb-3"></i>
          <p class="fw-semibold mb-1">Seu carrinho está vazio.</p>
          <p class="text-muted small mb-3">Adicione itens pelo cardápio para continuar.</p>
          <a href="cardapio.html" class="btn btn-danger">
            <i class="bi bi-grid me-1"></i>Ver Cardápio
          </a>
        </div>
      </div>
    </div>

    <!-- Conteúdo do carrinho — exibido pelo JS quando há itens -->
    <div id="conteudo-carrinho" class="d-none">
      <div class="row g-4 align-items-start">

        <!-- Coluna esquerda: tabela de itens + observações -->
        <div class="col-md-8">

          <!-- Tabela com os itens selecionados, quantidades e subtotais -->
          <div class="card shadow-sm border-0 mb-3">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light border-bottom">
                  <tr>
                    <th class="ps-4">Item</th>
                    <th class="text-center" style="width:70px;">Qtd</th>
                    <th class="text-end" style="width:120px;">Preço unit.</th>
                    <th class="text-end pe-4" style="width:120px;">Subtotal</th>
                  </tr>
                </thead>
                <tbody id="tbody-carrinho"></tbody>
              </table>
            </div>
          </div>

          <!-- Campo de observações (opcional) -->
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <div class="campo mb-0">
                <label for="observacoes" class="form-label fw-semibold">
                  Observações <span class="text-muted fw-normal small">(opcional)</span>
                </label>
                <textarea id="observacoes" name="observacoes" rows="3"
                          class="form-control"
                          placeholder="Ex.: sem cebola, ponto da carne…"></textarea>
              </div>
            </div>
          </div>

          <div class="mt-3">
            <a href="cardapio.html" class="text-muted small text-decoration-none">
              <i class="bi bi-arrow-left me-1"></i>Voltar ao Cardápio
            </a>
          </div>

        </div>

        <!-- Coluna direita: resumo do total + forma de pagamento + confirmar -->
        <div class="col-md-4">

          <!-- Resumo com o valor total do pedido -->
          <div class="card shadow-sm border-0 mb-3">
            <div class="card-body p-4">
              <p class="text-muted small fw-semibold text-uppercase mb-2"
                 style="font-size: .7rem; letter-spacing: .05em;">Resumo</p>
              <p class="fs-5 fw-semibold mb-0" style="color: var(--vermelho)">
                Total: <span id="total-carrinho">R$ 0,00</span>
              </p>
            </div>
          </div>

          <!-- Seleção de forma de pagamento e botão de confirmação -->
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <p class="text-muted small fw-semibold text-uppercase mb-3"
                 style="font-size: .7rem; letter-spacing: .05em;">Pagamento</p>

              <div class="campo mb-4">
                <label for="forma-pagamento" class="form-label fw-semibold">
                  Forma de pagamento *
                </label>
                <select id="forma-pagamento" class="form-select">
                  <option value="">Selecione…</option>
                  <option value="pix">Pix</option>
                  <option value="dinheiro">Dinheiro</option>
                  <option value="cartao_debito">Cartão de Débito</option>
                  <option value="cartao_credito">Cartão de Crédito</option>
                </select>
              </div>

              <p id="mensagem-erro" class="erro"></p>

              <div class="d-grid">
                <button id="btn-confirmar" type="button" class="btn btn-danger">
                  <i class="bi bi-check-circle me-1"></i>Confirmar Pedido
                </button>
              </div>

            </div>
          </div>

        </div>

      </div>
    </div>

  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/carrinho.js"></script>
</body>
</html>
