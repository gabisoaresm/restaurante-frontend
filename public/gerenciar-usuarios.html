<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciar Usuários — Cucina Italiana</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container mt-4">

    <div class="mb-4">
      <h2 class="fw-semibold mb-0">Gerenciar Usuários</h2>
      <p class="text-muted small mb-0">Visão gerencial — visualize e altere o tipo de perfil dos usuários cadastrados</p>
    </div>

    <p id="mensagem-erro" class="erro text-center"></p>

    <div id="carregando" class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
      Carregando usuários…
    </div>

    <div id="conteudo-principal" class="d-none fade-in">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom py-3 px-4 d-flex flex-wrap justify-content-between align-items-center gap-2">
          <span id="contador-usuarios" class="fw-semibold small mb-0"></span>
          <span class="text-muted small mb-0">Escolha o novo perfil e clique em Salvar para aplicar</span>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0 tabela-usuarios">
            <thead class="table-light border-bottom">
              <tr>
                <th class="ps-4">Usuário</th>
                <th class="col-nome">Nome completo</th>
                <th class="col-email">E-mail</th>
                <th class="col-cadastro text-nowrap">Cadastro</th>
                <th>Alterar perfil</th>
                <th class="pe-4 text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="lista-vazia" class="d-none fade-in">
      <div class="card shadow-sm border-0">
        <div class="card-body text-center py-5">
          <i class="bi bi-people fs-1 text-muted d-block mb-3"></i>
          <p class="text-muted mb-0">Nenhum usuário cadastrado.</p>
        </div>
      </div>
    </div>

  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/gerenciar-usuarios.js"></script>
</body>
</html>
