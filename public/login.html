<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Cucina Italiana</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-sm-10 col-md-7 col-lg-5">

        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">

            <div class="text-center mb-4">
              <i class="bi bi-person-circle fs-1" style="color: var(--vermelho)"></i>
              <h4 class="mt-2 fw-semibold">Bem-vindo de volta</h4>
              <p class="text-muted small">Entre com suas credenciais para continuar</p>
            </div>

            <form id="form-login" novalidate>

              <div class="campo mb-3">
                <label for="username" class="form-label fw-semibold">Usuário</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-person text-muted"></i>
                  </span>
                  <input type="text" id="username" name="username" required autofocus
                         class="form-control border-start-0" autocomplete="username" />
                </div>
              </div>

              <div class="campo mb-4">
                <label for="password" class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-lock text-muted"></i>
                  </span>
                  <input type="password" id="password" name="password" required
                         class="form-control border-start-0" autocomplete="current-password" />
                </div>
              </div>

              <p id="mensagem-erro" class="erro"></p>

              <div class="d-grid">
                <button type="submit" class="btn btn-danger btn-lg">
                  <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                </button>
              </div>

            </form>

            <hr class="my-4" />

            <div class="text-center small">
              Não tem conta?
              <a href="registro.html" class="fw-semibold text-decoration-none" style="color: var(--vermelho)">Registre-se</a>
              <span class="text-muted mx-2">·</span>
              <a href="esqueci-senha.html" class="text-decoration-none" style="color: var(--vermelho)">Esqueceu a senha?</a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Ordem de inclusão garante que constantes e autenticacao estejam disponíveis globalmente -->
  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/toast.js"></script>
  <script src="javascript/login.js"></script>
</body>
</html>
