<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Início — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container mt-4">

    <!-- Spinner exibido enquanto autenticacao.ts resolve o tipo do usuário -->
    <div id="carregando" class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
      Carregando…
    </div>

    <!-- Vista para visitantes não autenticados -->
    <div id="vista-visitante" class="d-none">

      <!-- Cabeçalho compacto do restaurante (sem botões de ação) -->
      <div class="text-center pt-4 pb-3">
        <i class="bi bi-fork-knife fs-1 d-block mb-3" style="color: var(--vermelho)"></i>
        <h1 class="fw-bold mb-2" style="color: var(--vermelho); font-size: 2.2rem">Cucina Italiana</h1>
        <p class="text-muted mb-0" style="font-size: 1.1rem">
          Autêntica culinária italiana feita com ingredientes frescos e muito amor.
        </p>
      </div>

      <hr class="my-3" />

      <!-- Pills de filtro por categoria — populados via JavaScript -->
      <div id="filtros-visitante" class="d-flex flex-wrap gap-2 mb-4"></div>

      <!-- Spinner enquanto o cardápio carrega -->
      <div id="carregando-cardapio-visitante" class="text-center py-5 text-muted">
        <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
        Carregando cardápio…
      </div>

      <!-- Mensagem de erro do cardápio -->
      <p id="erro-cardapio-visitante" class="erro text-center"></p>

      <!-- Seções de itens por categoria — populadas via JavaScript -->
      <div id="lista-itens-visitante"></div>

      <!-- Convite ao login exibido abaixo do cardápio -->
      <div class="text-center py-4 mt-2 border-top">
        <p class="text-muted mb-0 small">
          Gostou?
          <a href="login.html" class="fw-semibold text-decoration-none" style="color: var(--vermelho)">
            Faça login ou crie uma conta
          </a>
          para realizar um pedido.
        </p>
      </div>

    </div>

    <!-- Dashboard personalizado para usuários autenticados -->
    <div id="vista-logada" class="d-none">
      <div id="boas-vindas" class="mb-4"></div>
      <div id="cards-dashboard" class="row g-4"></div>
    </div>

  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/index.js"></script>
</body>
</html>
