<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha — Restaurante</title>
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container">
    <section class="caixa-formulario">
      <h1>Redefinir Senha</h1>
      <p class="descricao-formulario">
        Cole o token recebido por e-mail e escolha sua nova senha.
      </p>
      <form id="form-redefinir-senha" novalidate>
        <div class="campo">
          <label for="token">Token recebido por e-mail</label>
          <input type="text" id="token" name="token" required autofocus
                 placeholder="Cole o token aqui" />
        </div>
        <div class="campo">
          <label for="password">Nova senha</label>
          <input type="password" id="password" name="password" required />
        </div>
        <div class="campo">
          <label for="password_confirm">Confirmar nova senha</label>
          <input type="password" id="password_confirm" name="password_confirm" required />
        </div>
        <p id="mensagem-erro" class="erro"></p>
        <button type="submit">Redefinir senha</button>
      </form>
      <p class="link-secundario">
        <a href="esqueci-senha.html">Solicitar novo token</a>
      </p>
    </section>
  </main>

  <!-- Ordem de inclusão garante que constantes e autenticacao estejam disponíveis globalmente -->
  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/redefinir-senha.js"></script>
</body>
</html>
