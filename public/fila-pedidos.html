<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fila de Pedidos — Cucina Italiana</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container mt-4">

    <!-- Cabeçalho -->
    <div class="mb-4">
      <h2 class="fw-semibold mb-0">Fila de Pedidos</h2>
      <p class="text-muted small mb-0">Acompanhe e atualize o status dos pedidos</p>
    </div>

    <!-- Filtros: status (pills) + data -->
    <div class="d-flex flex-wrap align-items-center gap-2 mb-4">
      <!-- Pills de status — populados via JavaScript -->
      <div id="filtros-status" class="d-flex flex-wrap gap-2"></div>

      <!-- Separador visual -->
      <div class="vr d-none d-sm-block mx-1"></div>

      <!-- Filtro por data -->
      <div class="d-flex align-items-center gap-2">
        <label for="filtro-data" class="form-label mb-0 small fw-semibold text-muted">Data:</label>
        <input type="date" id="filtro-data" class="form-control form-control-sm" style="width: auto;" />
        <button id="btn-limpar-data" class="btn btn-outline-secondary btn-sm d-none">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </div>

    <!-- Indicador de carregamento -->
    <div id="carregando" class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
      Carregando pedidos…
    </div>

    <!-- Mensagem de erro global -->
    <p id="mensagem-erro" class="erro text-center"></p>

    <!-- Lista de pedidos — populada via JavaScript -->
    <div id="lista-pedidos"></div>

  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/fila-pedidos.js"></script>
</body>
</html>
