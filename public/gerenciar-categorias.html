<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categorias — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container mt-4">

    <!-- Link de retorno para a página do cardápio -->
    <a href="cardapio.html" class="d-inline-flex align-items-center gap-1 mb-3 small fw-semibold text-decoration-none"
       style="color: var(--vermelho)">
      <i class="bi bi-arrow-left"></i>Voltar ao Cardápio
    </a>

    <!-- Cabeçalho com título e botão de nova categoria -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="fw-semibold mb-0">Categorias</h2>
        <p class="text-muted small mb-0">Gerencie as categorias do cardápio</p>
      </div>
      <a href="criar-categoria.html" class="btn btn-danger">
        <i class="bi bi-plus-lg me-1"></i>Nova Categoria
      </a>
    </div>

    <!-- Indicador de carregamento -->
    <div id="carregando" class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
      Carregando categorias…
    </div>

    <!-- Mensagem de erro global -->
    <p id="mensagem-erro" class="erro text-center"></p>

    <!-- Lista de categorias — populada via JavaScript -->
    <div id="lista-categorias"></div>

  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/gerenciar-categorias.js"></script>
</body>
</html>
