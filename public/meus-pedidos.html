<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Pedidos — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container mt-4">

    <!-- Cabeçalho com botão de novo pedido -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="fw-semibold mb-0">Meus Pedidos</h2>
        <p class="text-muted small mb-0">Acompanhe o status dos seus pedidos</p>
      </div>
      <a href="cardapio.html" class="btn btn-danger btn-sm">
        <i class="bi bi-plus-lg me-1"></i>Novo Pedido
      </a>
    </div>

    <!-- Indicador de carregamento -->
    <div id="carregando" class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
      Carregando pedidos…
    </div>

    <!-- Mensagem de erro global -->
    <p id="mensagem-erro" class="erro text-center"></p>

    <!-- Lista de pedidos — populada via JavaScript -->
    <div id="lista-pedidos"></div>

  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/meus-pedidos.js"></script>
</body>
</html>
