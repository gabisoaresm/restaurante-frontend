<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciar Usuários — Restaurante</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header id="cabecalho"></header>

  <main class="container mt-4">

    <div class="mb-4">
      <h4 class="fw-semibold mb-1">
        <i class="bi bi-people me-2"></i>Gerenciar Usuários
      </h4>
      <p class="text-muted small mb-0">Visualize e altere o tipo de perfil dos usuários cadastrados</p>
    </div>

    <div id="carregando" class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
      Carregando…
    </div>

    <div id="mensagem-erro" class="alert alert-danger d-none" role="alert"></div>

    <div id="tabela-container" class="d-none">
      <div class="card shadow-sm border-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light border-bottom">
              <tr>
                <th class="ps-4">Usuário</th>
                <th>Nome completo</th>
                <th>E-mail</th>
                <th>Membro desde</th>
                <th style="min-width: 190px;">Perfil</th>
                <th class="pe-4" style="width: 110px;">Ação</th>
              </tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="lista-vazia" class="d-none text-center py-5 text-muted">
      <i class="bi bi-people fs-2 d-block mb-2"></i>
      Nenhum usuário encontrado.
    </div>

  </main>

  <script src="javascript/constantes.js"></script>
  <script src="javascript/autenticacao.js"></script>
  <script src="javascript/logout.js"></script>
  <script src="javascript/gerenciar-usuarios.js"></script>
</body>
</html>
